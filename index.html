<!DOCTYPE html>
<html>
<head>
  <title>15 Stock Dashboard (Fixed)</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0b1220;
      color: white;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 10px;
      padding: 10px;
    }

    .box {
      background: #1e293b;
      border-radius: 12px;
      padding: 6px;
      height: 180px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.4);
    }

    .title {
      text-align: center;
      font-size: 12px;
      margin-bottom: 4px;
    }

    canvas {
      background: white;
      border-radius: 8px;
    }
  </style>
</head>

<body>

<div class="grid" id="grid"></div>

<script>
let stocks = {};
let charts = {};
let maxPoints = 30;

// 🔥 create 15 stocks safely
for (let i = 1; i <= 15; i++) {
  stocks["STOCK" + i] = [100 + Math.random() * 100];
}

// 📊 create chart function
function createChart(id, label) {
  return new Chart(document.getElementById(id), {
    type: "line",
    data: {
      labels: [],
      datasets: [{
        label: label,
        data: [],
        borderColor: "cyan",
        fill: false,
        tension: 0.3,
        pointRadius: 0
      }]
    },
    options: {
      animation: false,
      plugins: { legend: { display: false } },
      scales: {
        x: { display: false },
        y: { display: false }
      }
    }
  });
}

// 🔥 build UI AFTER page loads
window.onload = function () {

  let grid = document.getElementById("grid");

  let i = 0;
  for (let s in stocks) {

    let box = document.createElement("div");
    box.className = "box";

    box.innerHTML = `
      <div class="title">${s}</div>
      <canvas id="c${i}"></canvas>
    `;

    grid.appendChild(box);

    charts[s] = createChart("c" + i, s);

    i++;
  }

  // start updates AFTER charts exist
  setInterval(updateMarket, 700);
};

// 🚀 smooth update engine
function updateMarket() {
  for (let s in stocks) {

    let last = stocks[s][stocks[s].length - 1];
    let change = (Math.random() * 2 - 1);
    let next = last + change;

    stocks[s].push(next);

    if (stocks[s].length > maxPoints)
      stocks[s].shift();

    let chart = charts[s];

    chart.data.labels.push("");
    chart.data.datasets[0].data.push(next);

    if (chart.data.datasets[0].data.length > maxPoints) {
      chart.data.datasets[0].data.shift();
      chart.data.labels.shift();
    }

    chart.update("none");
  }
}
</script>

</body>
</html>
