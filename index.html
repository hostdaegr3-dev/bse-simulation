<!DOCTYPE html>
<html>
<head>
  <title>Smooth Trading App</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0f172a;
      color: white;
    }

    .top {
      background: #111827;
      padding: 12px;
      text-align: center;
      font-size: 20px;
      font-weight: bold;
    }

    .container {
      display: grid;
      grid-template-columns: 1fr 2fr 1fr;
      gap: 10px;
      padding: 10px;
    }

    .box {
      background: #1e293b;
      padding: 12px;
      border-radius: 10px;
    }

    select, button {
      width: 100%;
      padding: 10px;
      margin: 6px 0;
      border-radius: 6px;
      border: none;
    }

    .buy { background: #16a34a; color: white; }
    .sell { background: #dc2626; color: white; }

    canvas {
      background: white;
      border-radius: 10px;
      padding: 10px;
    }

    .stat {
      margin: 8px 0;
    }

    .news {
      font-size: 12px;
      opacity: 0.8;
    }
  </style>
</head>

<body>

<div class="top">📊 Smooth Trading Simulator</div>

<div class="container">

  <!-- LEFT -->
  <div class="box">
    <h3>Stocks</h3>

    <select id="stockSelect" onchange="switchStock()">
      <option>TCS</option>
      <option>RELIANCE</option>
      <option>INFY</option>
      <option>HDFC</option>
    </select>

    <div class="stat">Price: ₹<span id="price">0</span></div>

    <button class="buy" onclick="buy()">BUY</button>
    <button class="sell" onclick="sell()">SELL</button>

    <div class="news" id="newsBox">No news</div>
  </div>

  <!-- CENTER -->
  <div class="box">
    <canvas id="chart"></canvas>
  </div>

  <!-- RIGHT -->
  <div class="box">
    <h3>Portfolio</h3>

    <div class="stat">Cash: ₹<span id="cash">100000</span></div>
    <div class="stat">Shares: <span id="shares">0</span></div>
    <div class="stat">Profit: ₹<span id="profit">0</span></div>
  </div>

</div>

<script>
let stocks = {
  TCS: [100],
  RELIANCE: [2500],
  INFY: [1500],
  HDFC: [1600]
};

let current = "TCS";
let cash = 100000;
let shares = 0;
let invested = 0;
let labels = [];
let trend = 0;

const news = [
  {t:"Market rising", e:2},
  {t:"Tech boost", e:3},
  {t:"Global fear", e:-3},
  {t:"Stable economy", e:1}
];

const ctx = document.getElementById("chart").getContext("2d");

let chart = new Chart(ctx, {
  type: "line",
  data: {
    labels: labels,
    datasets: [{
      label: current,
      data: stocks[current],
      borderColor: "cyan",
      fill: false,
      tension: 0.3
    }]
  },
  options: { animation: false }
});

function price() {
  return stocks[current][stocks[current].length - 1];
}

function switchStock() {
  current = document.getElementById("stockSelect").value;

  chart.data.datasets[0].label = current;
  chart.data.datasets[0].data = stocks[current];
  chart.update();
}

function maybeNews() {
  if (Math.random() < 0.15) {
    let n = news[Math.floor(Math.random() * news.length)];
    trend = n.e;
    document.getElementById("newsBox").innerText = "📰 " + n.t;
  }
}

function updateMarket() {
  labels.push(labels.length);

  maybeNews();

  for (let s in stocks) {
    let last = stocks[s][stocks[s].length - 1];
    let change = (Math.random() * 2 - 1);
    let newsEffect = trend * 0.5;

    stocks[s].push(last + change + newsEffect);
  }

  chart.data.labels = labels;
  chart.update();
  updateUI();
}

function buy() {
  let p = price();

  if (cash >= p) {
    cash -= p;
    shares++;
    invested += p;
    updateUI();
  }
}

function sell() {
  if (shares > 0) {
    cash += price();
    shares--;
    updateUI();
  }
}

function updateUI() {
  let p = price();
  let profit = (p * shares) - invested;

  document.getElementById("price").innerText = p.toFixed(2);
  document.getElementById("cash").innerText = cash.toFixed(2);
  document.getElementById("shares").innerText = shares;
  document.getElementById("profit").innerText = profit.toFixed(2);
}

setInterval(updateMarket, 1500);
updateUI();
</script>

</body>
</html>
