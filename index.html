<!DOCTYPE html>
<html>
<head>
  <title>Live Trading Terminal (Smooth)</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0b1220;
      color: white;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 2fr;
      height: 100vh;
    }

    .control {
      background: #111827;
      padding: 15px;
    }

    .screen {
      background: #1e293b;
      padding: 10px;
    }

    input, select, button {
      width: 100%;
      padding: 10px;
      margin: 6px 0;
      border-radius: 6px;
      border: none;
    }

    button {
      cursor: pointer;
      font-weight: bold;
    }

    .update {
      background: #16a34a;
      color: white;
    }

    canvas {
      background: white;
      border-radius: 10px;
      padding: 10px;
      height: 100%;
    }
  </style>
</head>

<body>

<div class="grid">

  <!-- CONTROL PANEL -->
  <div class="control">
    <h2>👨‍🏫 Manual Price Control</h2>

    <select id="stock">
      <option>TCS</option>
      <option>RELIANCE</option>
      <option>INFY</option>
    </select>

    <input id="priceInput" type="number" placeholder="Enter price">

    <button class="update" onclick="updatePrice()">Update Price</button>

    <p style="font-size:12px;opacity:0.7">
      Smooth real-time streaming graph (no lag)
    </p>
  </div>

  <!-- LIVE GRAPH -->
  <div class="screen">
    <canvas id="chart"></canvas>
  </div>

</div>

<script>
let stocks = {
  TCS: 100,
  RELIANCE: 2500,
  INFY: 1500
};

let maxPoints = 80;
let labels = [];
let data = {
  TCS: [],
  RELIANCE: [],
  INFY: []
};

const ctx = document.getElementById("chart").getContext("2d");

let chart = new Chart(ctx, {
  type: "line",
  data: {
    labels: labels,
    datasets: [
      {
        label: "TCS",
        data: data.TCS,
        borderColor: "cyan",
        fill: false,
        tension: 0.35
      },
      {
        label: "RELIANCE",
        data: data.RELIANCE,
        borderColor: "lime",
        fill: false,
        tension: 0.35
      },
      {
        label: "INFY",
        data: data.INFY,
        borderColor: "orange",
        fill: false,
        tension: 0.35
      }
    ]
  },
  options: {
    animation: {
      duration: 200,
      easing: "linear"
    },
    responsive: true,
    maintainAspectRatio: false
  }
});

function updatePrice() {
  let stock = document.getElementById("stock").value;
  let newPrice = parseFloat(document.getElementById("priceInput").value);

  if (!newPrice) return;

  stocks[stock] = newPrice;
}

//  LIVE STREAM ENGINE
function stream() {
  labels.push(labels.length);

  for (let s in stocks) {
    let change = (Math.random() * 2 - 1);
    stocks[s] += change;

    data[s].push(stocks[s]);

    if (data[s].length > maxPoints) data[s].shift();
  }

  if (labels.length > maxPoints) labels.shift();

  chart.update("none"); // 🚀 ultra smooth update
}

setInterval(stream, 800); // smooth real-time feel
</script>

</body>
</html>
