<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>BSE Stock Market Simulation</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body {
      font-family: Arial;
      text-align: center;
      background: #f5f5f5;
    }

    canvas {
      background: white;
      border-radius: 10px;
      padding: 10px;
    }

    .controls {
      margin: 15px;
    }

    button {
      padding: 10px 15px;
      margin: 5px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
    }

    input, select {
      padding: 6px;
      margin: 5px;
    }

    #newsBox {
      margin-top: 10px;
      font-weight: bold;
    }
  </style>
</head>

<body>

<h2>BSE Stock Market Simulation 📈</h2>

<canvas id="chart" width="800" height="400"></canvas>

<div class="controls">
  <button onclick="startSimulation()">Start</button>
  <button onclick="stopSimulation()">Stop</button>
  <br>

  <label>Volatility:
    <input type="range" id="volatility" min="1" max="10" value="2">
  </label>
</div>

<div class="controls">
  <h3>News Impact System 📰</h3>

  <input type="text" id="newsText" placeholder="Enter news">

  <select id="impactType">
    <option value="positive">Positive 📈</option>
    <option value="negative">Negative 📉</option>
  </select>

  <input type="number" id="impactStrength" placeholder="Strength (e.g. 5)">

  <button onclick="applyNews()">Apply News</button>

  <div id="newsBox"></div>
</div>

<script>
let prices = [100];
let labels = [0];
let running = false;
let interval;
let newsImpact = 0;

const ctx = document.getElementById('chart').getContext('2d');

const chart = new Chart(ctx, {
  type: 'line',
  data: {
    labels: labels,
    datasets: [{
      label: 'Stock Price',
      data: prices,
      borderWidth: 2,
      fill: false
    }]
  },
  options: {
    animation: false,
    scales: {
      x: { title: { display: true, text: 'Time' } },
      y: { title: { display: true, text: 'Price' } }
    }
  }
});

function updatePrice() {
  let vol = document.getElementById('volatility').value;
  let randomChange = (Math.random() * vol * 2) - vol;

  let newPrice = prices[prices.length - 1] + randomChange + newsImpact;

  // reset after applying once
  newsImpact = 0;

  prices.push(newPrice);
  labels.push(labels.length);

  chart.update();
}

function startSimulation() {
  if (!running) {
    running = true;
    interval = setInterval(updatePrice, 1000);
  }
}

function stopSimulation() {
  running = false;
  clearInterval(interval);
}

function applyNews() {
  let text = document.getElementById('newsText').value;
  let type = document.getElementById('impactType').value;
  let strength = parseFloat(document.getElementById('impactStrength').value) || 0;

  newsImpact = (type === 'positive') ? strength : -strength;

  document.getElementById('newsBox').innerText =
    "News Applied: " + text + " (" + type + ")";
}
</script>

</body>
</html>
