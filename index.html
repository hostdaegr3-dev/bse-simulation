<style>
  body {
    margin: 0;
    font-family: Arial;
    background: #0b1220;
    color: white;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr); /* 5 columns */
    gap: 12px;
    padding: 12px;
  }

  .box {
    background: #1e293b;
    border-radius: 12px;
    padding: 8px;
    height: 180px;

    /* makes each chart visually separate */
    box-shadow: 0 4px 10px rgba(0,0,0,0.4);
  }

  .title {
    font-size: 12px;
    text-align: center;
    margin-bottom: 5px;
    opacity: 0.9;
  }

  canvas {
    background: white;
    border-radius: 8px;
  }
</style>
