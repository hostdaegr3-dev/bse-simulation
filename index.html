<!DOCTYPE html>
<html>
<head>
  <title>Final Boss Trading Terminal</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #050b18;
      color: white;
    }

    .header {
      padding: 15px;
      text-align: center;
      background: #111827;
      font-size: 22px;
      font-weight: bold;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 2fr 1fr;
      gap: 10px;
      padding: 10px;
    }

    .panel {
      background: #1e293b;
      padding: 12px;
      border-radius: 10px;
    }

    select, button {
      width: 100%;
      padding: 10px;
      margin: 6px 0;
      border: none;
      border-radius: 6px;
    }

    .buy { background: #16a34a; color: white; font-weight: bold; }
    .sell { background: #dc2626; color: white; font-weight: bold; }

    canvas {
      background: white;
      border-radius: 10px;
      padding: 10px;
    }

    .stat {
      margin: 8px 0;
    }

    .news {
      font-size: 12px;
      opacity: 0.9;
      margin-top: 10px;
    }
  </style>
</head>

<body>

<div class="header">📊 FINAL BOSS TRADING TERMINAL</div>

<div class="grid">

  <!-- LEFT -->
  <div class="panel">
    <h3>Market</h3>

    <select id="stockSelect" onchange="changeStock()">
      <option>TCS</option>
      <option>RELIANCE</option>
      <option>INFY</option>
      <option>HDFC</option>
    </select>

    <div class="stat">Price: ₹<span id="price">0</span></div>

    <button class="buy" onclick="buy()">BUY</button>
    <button class="sell" onclick="sell()">SELL</button>

    <div class="news" id="newsBox">📰 Market stable</div>
  </div>

  <!-- CENTER -->
  <div class="panel">
    <canvas id="chart"></canvas>
  </div>

  <!-- RIGHT -->
  <div class="panel">
    <h3>Portfolio</h3>

    <div class="stat">Cash: ₹<span id="cash">100000</span></div>
    <div class="stat">Shares: <span id="shares">0</span></div>
    <div class="stat">Avg Price: ₹<span id="avg">0</span></div>
    <div class="stat">Profit/Loss: ₹<span id="pl">0</span></div>
    <div class="stat">Trend: <span id="trend">Neutral</span></div>
  </div>

</div>

<script>
let stocks = {
  TCS: [100],
  RELIANCE: [2500],
  INFY: [1500],
  HDFC: [1600]
};

let current = "TCS";
let cash = 100000; // ✅ UPDATED
let shares = 0;
let invested = 0;
let labels = [];
let trend = 0;

let newsPool = [
  {t:"Global market rally", e:3},
  {t:"Tech stocks surge", e:2},
  {t:"Inflation fears rise", e:-3},
  {t:"Oil prices spike", e:-2},
  {t:"Strong earnings season", e:2},
  {t:"Market uncertainty", e:-1}
];

const ctx = document.getElementById("chart").getContext("2d");

let chart = new Chart(ctx, {
  type: "line",
  data: {
    labels: labels,
    datasets: [{
      label: current,
      data: stocks[current],
      borderColor: "cyan",
      fill: false
    }]
  },
  options: { animation: false }
});

function price() {
  return stocks[current][stocks[current].length - 1];
}

function changeStock() {
  current = document.getElementById("stockSelect").value;

  chart.data.datasets[0].label = current;
  chart.data.datasets[0].data = stocks[current];
  chart.update();
}

function triggerNews() {
  let n = newsPool[Math.floor(Math.random() * newsPool.length)];
  trend = n.e;

  document.getElementById("newsBox").innerText = "📰 " + n.t;

  document.getElementById("trend").innerText =
    trend > 0 ? "Bullish 📈" : "Bearish 📉";
}

function marketMove() {
  labels.push(labels.length);

  if (Math.random() < 0.25) triggerNews();

  for (let s in stocks) {
    let last = stocks[s][stocks[s].length - 1];

    let base = (Math.random() * 3 - 1.5);
    let newsImpact = trend * 0.8;

    stocks[s].push(last + base + newsImpact);
  }

  chart.data.labels = labels;
  chart.update();
  updateUI();
}

function buy() {
  let p = price();

  if (cash >= p) {
    cash -= p;
    shares++;
    invested += p;
    updateUI();
  }
}

function sell() {
  if (shares > 0) {
    cash += price();
    shares--;
    updateUI();
  }
}

function updateUI() {
  let p = price();
  let avg = shares ? invested / shares : 0;
  let pl = (p * shares) - invested;

  document.getElementById("price").innerText = p.toFixed(2);
  document.getElementById("cash").innerText = cash.toFixed(2);
  document.getElementById("shares").innerText = shares;
  document.getElementById("avg").innerText = avg.toFixed(2);
  document.getElementById("pl").innerText = pl.toFixed(2);
}

setInterval(marketMove, 12 * 60 * 1000); // ⏱️ 12 MINUTES
updateUI();
</script>

</body>
</html>
